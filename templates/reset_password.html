<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password - Dolphin Bypass Tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .reset-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 450px;
      backdrop-filter: blur(10px);
    }

    h2 {
      color: #333;
      margin-bottom: 10px;
      text-align: center;
      font-size: 28px;
      font-weight: 600;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .flash-messages {
      margin-bottom: 20px;
    }

    .flash-message {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .flash-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .flash-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .password-hint {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    .strength-meter {
      margin-top: 10px;
      height: 5px;
      background: #e0e0e0;
      border-radius: 5px;
      overflow: hidden;
    }

    .strength-meter-fill {
      height: 100%;
      width: 0;
      transition: width 0.3s, background 0.3s;
    }

    .strength-text {
      font-size: 12px;
      margin-top: 5px;
      text-align: right;
    }

    .links {
      text-align: center;
      margin-top: 25px;
    }

    .links a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <h2>🔐 Set New Password</h2>
    <div class="subtitle">Enter your new password below</div>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
            <div class="flash-message flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    
    <form action="/auth/reset-password/{{ token }}" method="POST">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" name="password" placeholder="Enter new password" required minlength="6">
        <div class="strength-meter">
          <div class="strength-meter-fill" id="strengthFill"></div>
        </div>
        <div class="strength-text" id="strengthText"></div>
      </div>
      
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required>
        <div class="password-hint" id="matchHint"></div>
      </div>
      
      <button type="submit" class="btn" id="submitBtn">Reset Password</button>
    </form>
    
    <div class="links">
      <p><a href="/login">← Back to Login</a></p>
    </div>
  </div>

  <script>
    const password = document.getElementById('password');
    const confirm = document.getElementById('confirm_password');
    const strengthFill = document.getElementById('strengthFill');
    const strengthText = document.getElementById('strengthText');
    const matchHint = document.getElementById('matchHint');
    const submitBtn = document.getElementById('submitBtn');

    function checkPasswordStrength() {
      const val = password.value;
      let strength = 0;
      
      if (val.length >= 6) strength += 1;
      if (val.match(/[a-z]+/)) strength += 1;
      if (val.match(/[A-Z]+/)) strength += 1;
      if (val.match(/[0-9]+/)) strength += 1;
      if (val.match(/[$@#&!]+/)) strength += 1;
      
      const percentage = (strength / 5) * 100;
      strengthFill.style.width = percentage + '%';
      
      if (strength <= 2) {
        strengthFill.style.background = '#dc3545';
        strengthText.textContent = 'Weak';
        strengthText.style.color = '#dc3545';
      } else if (strength <= 4) {
        strengthFill.style.background = '#ffc107';
        strengthText.textContent = 'Medium';
        strengthText.style.color = '#ffc107';
      } else {
        strengthFill.style.background = '#28a745';
        strengthText.textContent = 'Strong';
        strengthText.style.color = '#28a745';
      }
    }

    function checkMatch() {
      if (confirm.value.length === 0) {
        matchHint.textContent = '';
        return;
      }
      
      if (password.value === confirm.value) {
        matchHint.textContent = '✅ Passwords match';
        matchHint.style.color = '#28a745';
      } else {
        matchHint.textContent = '❌ Passwords do not match';
        matchHint.style.color = '#dc3545';
      }
    }

    password.addEventListener('input', checkPasswordStrength);
    password.addEventListener('input', checkMatch);
    confirm.addEventListener('input', checkMatch);
  </script>
</body>
</html>
